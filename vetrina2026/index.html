<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EmoPet Vetrina 2026</title>
    <link rel="apple-touch-icon" href="../Ologramma%20di%20cane%20e%20gatto-EmoPet.png">
    <style>
        :root { --primary: #0d9488; --accent: #fbbf24; --bg: #0f172a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 20px; background: rgba(255,255,255,0.05); border-bottom: 2px solid var(--primary); }
        .logo-emopet { width: 100px; height: auto; filter: drop-shadow(0 0 8px cyan); }
        .container { flex: 1; width: 95%; max-width: 1100px; margin: auto; padding: 10px; }
        
        .lang-switch { margin: 15px 0; display: flex; justify-content: center; gap: 8px; }
        .lang-btn { background: #1e293b; color: white; border: 1px solid var(--primary); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--primary); font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; padding-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .card img { width: 100%; height: auto; aspect-ratio: 1/1; object-fit: cover; transition: 0.5s; }
        
        .kinematic-demo { background: linear-gradient(135deg, #134e4a 0%, #1e3a8a 100%); padding: 20px; border-radius: 25px; margin: 20px 0; border: 1px solid var(--accent); }
        .play-btn { background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 80%; }
        
        /* Footer per RAI e Copyright */
        footer { background: rgba(0,0,0,0.5); padding: 15px; font-size: 0.85rem; border-top: 1px solid var(--primary); color: #cbd5e1; }
        .award-badge { color: var(--accent); font-weight: bold; display: block; margin-bottom: 5px; font-size: 1rem; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .pulse-heart { display: inline-block; animation: pulse 2s infinite; font-size: 1.5rem; }
    </style>
</head>
<body>

<header>
    <img src="../Ologramma%20di%20cane%20e%20gatto-EmoPet.png" class="logo-emopet" alt="Logo EmoPet">
    <h1 id="main-title" style="font-size: 1.4rem; margin: 5px 0;">EmoPet World 2026</h1>
    <div class="lang-switch">
        <button class="lang-btn active" onclick="changeLang('it', event)">IT 🇮🇹</button>
        <button class="lang-btn" onclick="changeLang('en', event)">EN 🇬🇧</button>
        <button class="lang-btn" onclick="changeLang('fr', event)">FR 🇫🇷</button>
    </div>
</header>

<div class="container">
    <section class="kinematic-demo">
        <h2 id="kin-title" style="font-size: 1.1rem; margin: 0;">Kinematic & Biofeedback</h2>
        <p id="kin-desc" style="font-size: 0.85rem;">Sincronizzazione in tempo reale tra battito e avatar.</p>
        <div class="pulse-heart">❤️ ➔ 🐾</div>
    </section>

    <div class="grid">
        <div class="card">
            <img src="fritz_dentista.png" id="img-fritz">
            <h3 id="t1" style="font-size: 1rem;">Fritz dal Dentista</h3>
            <button class="play-btn" onclick="playStory('fritz')">Play Audio</button>
        </div>
        <div class="card">
            <img src="lulu_bosco.png" id="img-lulu">
            <h3 id="t2" style="font-size: 1rem;">Lulù nel Bosco</h3>
            <button class="play-btn" onclick="playStory('lulu')">Play Audio</button>
        </div>
    </div>
</div>

<footer>
    <span class="award-badge" id="award-text">🏆 Vincitore Mondiale Gara EmoPet 2025</span>
    <div id="copy-text">© 2026 Progetto EmoPet - Ideato da Leonardo Tronci</div>
    <div style="font-size: 0.7rem; margin-top: 5px; opacity: 0.7;">Demo Vetrina Aggiornata - RAI Special Edition</div>
</footer>

<script>
    const content = {
        it: { t: "EmoPet World 2026", kt: "Kinematic & Biofeedback", kd: "Il sistema sincronizza il respiro dell'utente con l'avatar.", s1: "Fritz dal Dentista", s2: "Lulù nel Bosco", v: "it-IT", fTxt: "Fritz è coraggioso sulla poltrona spaziale. Respira con lui!", lTxt: "Lulù cammina serena nel bosco magico. Senti la calma.", award: "🏆 Vincitore Mondiale Gara EmoPet 2025", copy: "© 2026 Progetto EmoPet - Ideato da Leonardo Tronci" },
        en: { t: "EmoPet World 2026", kt: "Kinematic Tech", kd: "Synchronizing user breathing with the digital avatar.", s1: "Fritz at the Dentist", s2: "Lulu in the Forest", v: "en-US", fTxt: "Fritz is brave. Take a breath with him!", lTxt: "Lulu is peaceful in the forest.", award: "🏆 2025 EmoPet Global Competition Winner", copy: "© 2026 EmoPet Project - Created by Leonardo Tronci" },
        fr: { t: "EmoPet Monde 2026", kt: "Cinématique & Biofeedback", kd: "Synchronisation de la respiration con l'avatar.", s1: "Fritz chez le Dentiste", s2: "Lulu dans la Forêt", v: "fr-FR", fTxt: "Fritz est courageux!", lTxt: "Lulu est paisible.", award: "🏆 Gagnant Mondial du Concours EmoPet 2025", copy: "© 2026 Projet EmoPet - Créé par Leonardo Tronci" }
    };

    let currentLang = 'it';

    function changeLang(lang, event) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('main-title').innerText = content[lang].t;
        document.getElementById('kin-title').innerText = content[lang].kt;
        document.getElementById('kin-desc').innerText = content[lang].kd;
        document.getElementById('t1').innerText = content[lang].s1;
        document.getElementById('t2').innerText = content[lang].s2;
        document.getElementById('award-text').innerText = content[lang].award;
        document.getElementById('copy-text').innerText = content[lang].copy;
    }

    function playStory(pet) {
        window.speechSynthesis.cancel();
        const img = document.getElementById('img-' + pet);
        const winSrc = pet === 'fritz' ? 'fritz_vittoria.png' : 'lulu_vittoria.png';
        const originalSrc = pet === 'fritz' ? 'fritz_dentista.png' : 'lulu_bosco.png';
        
        img.src = winSrc;
        const msg = new SpeechSynthesisUtterance();
        msg.text = pet === 'fritz' ? content[currentLang].fTxt : content[currentLang].lTxt;
        msg.lang = content[currentLang].v;
        msg.onend = () => { setTimeout(() => { img.src = originalSrc; }, 3000); };
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
